@font-face {

:root {

    --primary-green: #006233;
    --primary-red: #D22B2B;

    --ui-surface: #ffffff;
    --ui-border: #e2e8f0;
    --ui-text: #1e293b;

}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {

    flex-direction: column; 
    align-items: center; 
    gap: 30px;
}

/* --- تنسيقات لوحة التحكم --- */
#control-panel {
    width: 100%; 
    max-width: 1450px; 
    background: var(--ui-surface); 
    padding: 30px;

    box-shadow: var(--shadow-lg); 
    font-family: 'Cairo', sans-serif;
    border: 1px solid var(--ui-border);
}

.panel-header { 
    display: flex; 
    flex-direction: column; 
    justify-content: center; 
    align-items: center; 
    margin-bottom: 30px; 
    border-bottom: 2px solid var(--ui-border); 
    padding-bottom: 20px; 
    gap: 20px;
}

.panel-header h2 {
    color: var(--ui-secondary);
    font-size: 26px;
    font-weight: 800;
}

.panel-header div {

    align-items: center;

}

}

.form-group select:focus, .form-group input:focus {

    box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.15);
}

.form-group[style*="margin-bottom: 20px;"] {

}

}

th {

}

/* --- تنسيق صفحة A4 (توسيط رياضي دقيق لـ 6 بطاقات) --- */
.page-a4 {
    width: 210mm;
    height: 297mm; /* ارتفاع ثابت لورقة A4 */
    background: white;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(2, 85.6mm); 
    grid-template-rows: repeat(3, 54mm); 
    column-gap: 15mm; 
    row-gap: 20mm;    
    
    justify-content: center; /* إبقاء التوسيط الأفقي (يمين ويسار) كما هو */
    
    /* --- التعديلات الجديدة لرفع البطاقات للأعلى --- */
    align-content: start; /* هذه الخاصية تدفع شبكة البطاقات للأعلى */
    padding-top: 15mm;    /* ترك مسافة 1.5 سم من أعلى الورقة كمنطقة آمنة للطابعة */
    
    box-sizing: border-box;
    overflow: hidden; 
}
.card-wrapper {
    width: 85.6mm !important;
    height: 54mm !important;

    border: 1px solid #ddd;
    border-radius: 4px;
    overflow: hidden;
    box-sizing: border-box;
    page-break-inside: avoid !important; 
}

.card {

}

.top-deco-bar { width: 100%; height: 8px; display: flex; z-index: 10; }

.photo-frame { width: 130px; height: 170px; background-color: #fafafa; border: 2px solid #fff; box-shadow: 0 4px 8px rgba(0,0,0,0.15); border-radius: 6px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; overflow: hidden; }

/* --- إعدادات الطباعة الصارمة --- */
@media print {
    /* إجبار المتصفح على أعلى جودة لتصيير النصوص والأشكال */
    * {
        text-rendering: geometricPrecision !important;
        shape-rendering: geometricPrecision !important;
    }

    img { 
        image-rendering: high-quality !important; 
        -webkit-user-drag: none;
    }

    /* إلغاء أي هوامش افتراضية من المتصفح */
    @page { 
        size: A4 portrait;
        margin: 0mm !important; 
    }

    body { 
        background: white; 
        padding: 0 !important; 
        margin: 0 !important; 
        -webkit-print-color-adjust: exact; 
        print-color-adjust: exact; 
        display: block !important; 
    }
    
    .no-print { display: none !important; }

    /* الإعداد الصارم لورقة A4 */
    .page-a4 { 
        width: 210mm !important; 
        height: 297mm !important; 
        min-height: 297mm !important;
        max-height: 297mm !important;
        margin: 0 !important; 
        border: none !important; 
        box-shadow: none !important;
        
        /* الأوامر الأهم لفصل الصفحات ومنع تداخلها */
        page-break-after: always !important; 
        break-after: page !important; 
        page-break-inside: avoid !important;
        
        /* إعدادات الشبكة والتوسيط */
        display: grid !important;
        grid-template-columns: repeat(2, 85.6mm) !important; 
        grid-template-rows: repeat(3, 54mm) !important; 
        column-gap: 15mm !important; 
        row-gap: 20mm !important;    
        justify-content: center !important;
        align-content: start !important; 
        padding-top: 15mm !important;
        padding-bottom: 0 !important;
        
        box-sizing: border-box !important;
        overflow: hidden !important;
        page-break-after: always; /* يضمن قطع الـ PDF عند نهاية كل ورقة A4 */
    }

    .card-wrapper {
        page-break-inside: avoid !important;
        break-inside: avoid !important; 
    }

    .page-a4:last-of-type {
        page-break-after: auto !important;
        break-after: auto !important;
    }

    .page-a4:empty {
        display: none !important;
    }

    .header-logo { filter: none !important; }
    img { image-rendering: -webkit-optimize-contrast; object-fit: cover; }
    .barcode-container svg { shape-rendering: crispEdges; }
}

#card-container.theme-3 .card {

    background-image: none !important; /* لإلغاء التدرج إذا كنت أضفته في الخطوة السابقة */

/* استخدام الارتفاع 100% لمنع خطأ الإزاحة (Offset Bug) عند التحويل لـ PDF */

#card-container.theme-3 .card::after { 
    content: ''; 
    position: absolute;

        // --- 2. إعداد القوائم المنسدلة (Dropdown Logic) ---
        function initDropdowns() {
            const daairaSelect = document.getElementById('sel-daaira');
            daairaSelect.innerHTML = '';
            for (let daaira in baladiyaMap) {
                daairaSelect.innerHTML += `<option value="${daaira}">${daaira}</option>`;
            }
            updateMunicipalities();
        }

        function updateMunicipalities() {
            const daaira = document.getElementById('sel-daaira').value;
            const baladiyaSelect = document.getElementById('sel-municipality');
            baladiyaSelect.innerHTML = '';
            
            if (baladiyaMap[daaira]) {
                baladiyaMap[daaira].forEach(b => {
                    baladiyaSelect.innerHTML += `<option value="${b}">${b}</option>`;
                });
            }
            updateInstitutions();
        }

        function updateInstitutions() {
            const stage = document.getElementById('sel-stage').value;
            const daaira = document.getElementById('sel-daaira').value;
            const baladiya = document.getElementById('sel-municipality').value;
            const instSelect = document.getElementById('sel-institution');
            
            instSelect.innerHTML = '<option value="">اختر المؤسسة...</option>';

            if (stage === 'ابتدائي') {
                if (primarySchoolsByBaladiya[baladiya]) {
                    primarySchoolsByBaladiya[baladiya].forEach(school => {
                        instSelect.innerHTML += `<option value="${school.name}">${school.name}</option>`;
                    });
                }
            } else {
                if (institutionsByDaaira[daaira] && institutionsByDaaira[daaira][stage]) {
                    institutionsByDaaira[daaira][stage].forEach(school => {
                        instSelect.innerHTML += `<option value="${school.name}">${school.name}</option>`;
                    });
                }
            }
            updateCardsWorkplace();
        }

        function updateCardsWorkplace() {
            // تحديث مكان العمل في مصفوفة الموظفين عند تغيير المؤسسة
            const selectedInstitution = document.getElementById('sel-institution').value;
            if(selectedInstitution && employees.length > 0) {
                employees.forEach(emp => emp.workplace = selectedInstitution);
                saveToStorage();
                renderTable();
            }
        }

        // --- 3. المتغيرات والتخزين المحلي ---
        let employees = [];
        let currentEditingId = null;
        let cropper = null;

        window.onload = async () => {
            initDropdowns(); // تهيئة القوائم عند التحميل
            const savedData = await localforage.getItem('employeeData');
            if (savedData) {
                employees = savedData;
                renderTable();
                renderCards();
            }
        };

        function saveToStorage() {
            localforage.setItem('employeeData', employees);
            renderCards();
        }

        function clearData() {
            if(confirm('هل أنت متأكد من مسح جميع البيانات والصور؟')) {

                renderCards();
                document.getElementById('file-upload').value = "";
            }
        }

     // --- 4. رفع الملف وقراءة البيانات عبر الزر ---
        function loadEmployeeData() {
            const fileInput = document.getElementById('file-upload');
            const file = fileInput.files[0];
            
            if (!file) {
                alert("يرجى اختيار ملف الإكسل أولاً قبل الضغط على تحميل!");
                return;
            }

            const selectedInstitution = document.getElementById('sel-institution').value;
            if(!selectedInstitution) {
                alert("تنبيه: لم تقم باختيار المؤسسة. سيتم ترك مكان العمل فارغاً في البطاقات حالياً.");
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    
                    // 1. قراءة الملف أولاً كـ Array للبحث عن السطر الذي يحتوي على العناوين
                    const rawArray = XLSX.utils.sheet_to_json(firstSheet, { header: 1, defval: "" });
                    
                    let headerRowIndex = -1;
                    for (let i = 0; i < Math.min(10, rawArray.length); i++) {
                        const row = rawArray[i].map(c => String(c).trim());
                        // إذا وجدنا كلمة الاسم أو اللقب، فهذا هو سطر العناوين
                        if (row.includes("الاسم") || row.includes("اللقب")) {
                            headerRowIndex = i;
                            break;
                        }
                    }

                    if (headerRowIndex === -1) {
                        alert("خطأ: لم نتمكن من العثور على عناوين الأعمدة (الاسم، اللقب). يرجى التأكد من تطابق الملف مع النموذج.");
                        return;
                    }

                    // 2. قراءة البيانات من السطر الصحيح الذي وجدناه
                    const rawData = XLSX.utils.sheet_to_json(firstSheet, { range: headerRowIndex, defval: "" });
                    
                    const parsedEmployees = rawData.map((row, index) => {
                        // 3. تنظيف أسماء الأعمدة من المسافات الزائدة المخفية (مثل "الاسم " تصبح "الاسم")
                        const cleanRow = {};
                        for (let key in row) {
                            cleanRow[key.trim()] = row[key];
                        }

                        let rawJobId = cleanRow["الرمز الوظيفي"] || cleanRow["الرقم الوظيفي"] || "";
                        let jobIdStr = rawJobId;
                        
                        if (typeof rawJobId === 'number') {
                            jobIdStr = rawJobId.toLocaleString('fullwide', {useGrouping:false});
                        } else if (typeof rawJobId === 'string' && rawJobId.toUpperCase().includes('E')) {
                            jobIdStr = Number(rawJobId).toLocaleString('fullwide', {useGrouping:false});
                        }

                        const firstName = cleanRow["الاسم"] || "";
                        const lastName = cleanRow["اللقب"] || "";
                        const fullName = (firstName + " " + lastName).trim();

                      let rawDob = cleanRow["تاريخ الازدياد"] || cleanRow["تاريخ الميلاد"] || "";
                        let dobStr = "";

                        if (rawDob) {
                            if (typeof rawDob === 'number') {
                                // 1. إذا كان التاريخ مخزناً كرقم تسلسلي في الإكسل
                                let date = new Date(Math.round((rawDob - 25569) * 86400 * 1000));
                                let day = String(date.getDate()).padStart(2, '0');
                                let month = String(date.getMonth() + 1).padStart(2, '0');
                                let year = date.getFullYear();
                                dobStr = `${year}-${month}-${day}`;
                            } else if (rawDob instanceof Date) {
                                // 2. إذا تعرف عليه الإكسل ككائن تاريخ مباشر
                                let day = String(rawDob.getDate()).padStart(2, '0');
                                let month = String(rawDob.getMonth() + 1).padStart(2, '0');
                                let year = rawDob.getFullYear();
                                dobStr = `${year}-${month}-${day}`;
                            } else {
                                let tempStr = String(rawDob).trim();
                                let parsedDate = new Date(tempStr);
                                
                                // 3. إذا كان نصاً طويلاً بالإنجليزية (مثل الذي ظهر لك: Sun Jun 26 1988...)
                                if (!isNaN(parsedDate.getTime()) && tempStr.match(/[a-zA-Z]/) && tempStr.length > 12) {
                                    let day = String(parsedDate.getDate()).padStart(2, '0');
                                    let month = String(parsedDate.getMonth() + 1).padStart(2, '0');
                                    let year = parsedDate.getFullYear();
                                    dobStr = `${year}-${month}-${day}`;
                                } else {
                                    // 4. إذا كان نصاً قصيراً عادياً (مثل 1988-06-26 أو 26/06/1988)
                                    let parts = tempStr.split(/[-/]/);
                                    if (parts.length === 3) {
                                        if (parts[0].length === 4) { 
                                            dobStr = `${parts[2].padStart(2, '0')}/${parts[1].padStart(2, '0')}/${parts[0]}`;
                                        } else if (parts[2].length === 4) { 
                                            dobStr = `${parts[0].padStart(2, '0')}/${parts[1].padStart(2, '0')}/${parts[2]}`;
                                        } else {
                                            dobStr = tempStr;
                                        }
                                    } else {
                                        dobStr = tempStr; // إرجاع النص كما هو إذا لم يتطابق مع أي شيء
                                    }
                                }
                            }
                        }
                        return {
                            id: 'emp_' + Date.now() + '_' + index,
                            name: fullName,
                            dob: dobStr,
                            rank: cleanRow["الرتبة"] || '',
                            workplace: selectedInstitution,
                            jobId: jobIdStr,
                            photo: null
                        };
                    }).filter(emp => emp.name !== ''); // تصفية الأسطر الفارغة تماماً

                    if (parsedEmployees.length === 0) {
                        alert("تم قراءة الملف ولكن يبدو أنه لا يحتوي على أسماء موظفين، أو أن البيانات غير مكتوبة تحت عمود 'الاسم'.");
                        return;
                    }

                    employees = parsedEmployees;
                    saveToStorage();
                    renderTable();
                    alert("تم تحميل " + employees.length + " موظف بنجاح!");
                    
                } catch (error) {
                    console.error("Error reading file:", error);
                    alert("حدث خطأ أثناء تحليل ملف الإكسل. تأكد من أن الملف سليم وغير تالف.");
                }
            };
            reader.readAsArrayBuffer(file);
        }

function renderTable() {

    employees.forEach((emp) => {

        tr.innerHTML = `

        // --- 6. قص وإدارة الصور ---
        function openCropper(event, empId) {
            const file = event.target.files[0];
            if (!file) return;

            currentEditingId = empId;
            const url = URL.createObjectURL(file);
            const imageElement = document.getElementById('cropper-image');
            imageElement.src = url;
            
            document.getElementById('cropper-modal').style.display = 'flex';

            if (cropper) cropper.destroy();
            cropper = new Cropper(imageElement, {
                aspectRatio: 130 / 170, // تناسب الإطار في البطاقة
                viewMode: 1,
                autoCropArea: 1
            });
            event.target.value = "";
        }

        function closeCropper() {
            document.getElementById('cropper-modal').style.display = 'none';
            if (cropper) { cropper.destroy(); cropper = null; }
            currentEditingId = null;
        }

     function saveCrop() {
    if (!cropper) return;
    
    // استخدام الإعداد الجديد ذو الجودة الفائقة (8 أضعاف) فقط
    const canvas = cropper.getCroppedCanvas({ 
        width: 1040, 
        height: 1360,
        fillColor: '#fff' // لضمان عدم وجود خلفية شفافة تسبب مشاكل في الطباعة
    });

    // تصدير الصورة بصيغة PNG غير مضغوطة للحفاظ على أعلى جودة
    const base64Image = canvas.toDataURL('image/png'); 

    const empIndex = employees.findIndex(e => e.id === currentEditingId);
    if (empIndex > -1) {
        employees[empIndex].photo = base64Image;
        saveToStorage();
        renderTable();
    }
    closeCropper();
}


        function deletePhoto(empId) {
            const empIndex = employees.findIndex(e => e.id === empId);
            if (empIndex > -1) {
                employees[empIndex].photo = null;
                saveToStorage();
                renderTable();
            }
        }

    style.innerHTML = `

            @page { size: A4 landscape !important; margin: 0mm !important; } 
            body { margin: 0 !important; padding: 0 !important; }
            .page-a4-large { margin: 0 !important; }
        }
    `;

    // 1. رسم البطاقات أولاً

        if (container) {
            autoShrinkText(container); // استهداف الحاوية الرئيسية

    }, 50);

    // 3. مهلة أمان (1 ثانية كاملة) لضمان أن المتصفح قد طبق الأحجام الجديدة لكل الموظفين
    setTimeout(() => {
        window.print();
        
        // إعادة الإعدادات للوضع الطبيعي بعد الطباعة
        isLargeFormat = false;
        style.innerHTML = `@media print { @page { size: A4 portrait !important; margin: 0mm !important; } }`;

}

function saveEmployee() {
    const id = document.getElementById('emp-id').value;
    const name = document.getElementById('emp-name').value;
    const dob = document.getElementById('emp-dob').value;
    const rank = document.getElementById('emp-rank').value;
    const jobId = document.getElementById('emp-jobid').value;
    const workplace = document.getElementById('sel-institution').value || "";

    if (!name.trim()) {
        alert("يرجى إدخال الاسم واللقب على الأقل!");
        return;
    }

    if (id) {
        // تحديث موظف موجود
        const index = employees.findIndex(e => e.id === id);
        if (index > -1) {
            employees[index].name = name;
            employees[index].dob = dob;
            employees[index].rank = rank;
            employees[index].jobId = jobId;
        }
    } else {
        // إضافة موظف جديد
        const newEmp = {
            id: 'emp_manual_' + Date.now(),
            name: name,
            dob: dob,
            rank: rank,
            workplace: workplace,
            jobId: jobId,
            photo: null
        };
        // إضافته في بداية المصفوفة ليظهر في أعلى الجدول
        employees.unshift(newEmp); 
    }

    saveToStorage();
    renderTable();
    closeEmployeeModal();
}

    if (confirm("هل أنت متأكد من حذف هذا الموظف؟ لا يمكن التراجع عن هذا الإجراء.")) {
        employees = employees.filter(e => e.id !== empId);
        saveToStorage();
        renderTable();
    }
}

// دالة لانتظار تحميل جميع الصور داخل عنصر معين
async function waitForImages(element) {
    const images = element.querySelectorAll('img');
    const promises = Array.from(images).map(img => {
        if (img.complete) return Promise.resolve();
        return new Promise((resolve) => {
            img.onload = resolve;
            img.onerror = resolve; // لا توقف العملية إذا فشلت صورة واحدة
        });
    });
    return Promise.all(promises);
}

async function generateProfessionalPDF(isLargeFormatConfig) {
    if (employees.length === 0) {
        alert("يرجى تحميل أو إضافة بيانات الموظفين أولاً.");
        return;
    }

    const templateId = parseInt(document.getElementById('pdf-template-select').value);
    const institutionSelect = document.getElementById('sel-institution');
    let institutionName = (institutionSelect.selectedIndex !== -1 && institutionSelect.value !== "") 
        ? institutionSelect.options[institutionSelect.selectedIndex].text.replace(/\s+/g, '_') 
        : "بدون_مؤسسة";

    // 1. إصلاح مشكلة الزر: تحديد الزر بناءً على المعطيات بدون استخدام event
    const btn = isLargeFormatConfig 
        ? document.querySelector('button[onclick="downloadLargePDF()"]')
        : document.querySelector('button[onclick="downloadSelectedPDF()"]');
        
    const originalText = btn ? btn.innerHTML : '';
    if (btn) {
        btn.innerHTML = '⏳ جاري تحضير وإنشاء الـ PDF...';
        btn.disabled = true;
    }
    document.body.style.cursor = 'wait';

    // 2. إصلاح مشكلة الـ CSS: نقوم بتغيير اسم الحاوية الأصلية مؤقتاً
    // لكي نتمكن من استخدام id="card-container" للحاوية المخفية وتطبيق كافة ألوانك وتنسيقاتك عليها
    const originalContainer = document.getElementById('card-container');
    if (originalContainer) originalContainer.id = 'card-container-temp';

    try {
        const { jsPDF } = window.jspdf;
        
        // إعدادات مقاسات الميليمتر الثابتة
        const pdfOrientation = isLargeFormatConfig ? 'landscape' : 'portrait';
        const doc = new jsPDF({ orientation: pdfOrientation, unit: 'mm', format: 'a4' });
        
        const cardWidthPx = 750;
        const cardHeightPx = 474;
        
        // إعدادات هندسة الصفحة
        const config = isLargeFormatConfig ? {
            cardW_mm: 100, cardH_mm: 67, cols: 2, rows: 2,
            startX: 41, startY: 10, gapX: 15, gapY: 4, cardsPerPage: 4
        } : {
            cardW_mm: 85.6, cardH_mm: 54, cols: 2, rows: 3,
            startX: 11.9, startY: 15, gapX: 15, gapY: 20, cardsPerPage: 6
        };

        // إنشاء حاوية مخفية خارج الشاشة لتصيير البطاقات بحجمها الأصلي
        const renderContainer = document.createElement('div');
        renderContainer.id = 'card-container'; // إعطاؤها المُعرّف الأصلي لسحب الـ CSS
        renderContainer.style.position = 'fixed';
        renderContainer.style.top = '-9999px';
        renderContainer.style.left = '-9999px';
        renderContainer.style.width = `${cardWidthPx}px`;
        renderContainer.style.height = `${cardHeightPx}px`;
        renderContainer.style.background = 'white';
        renderContainer.style.zIndex = '-1000';
        
        // إضافة الكلاس المناسب للتصميم
        renderContainer.className = templateId === 2 ? 'theme-2' : (templateId === 3 ? 'theme-3' : (templateId === 4 ? 'theme-4' : ''));
        document.body.appendChild(renderContainer);

        await waitForFonts(); // التأكد من تحميل الخطوط قبل التصيير

        // الدوران على الموظفين لمعالجة كل بطاقة على حدة
        for (let i = 0; i < employees.length; i++) {
            const emp = employees[i];
            
          
// بعد حقن الـ HTML
renderContainer.innerHTML = getCardHTML(emp, templateId);
// استدعاء التصغير فوراً
autoShrinkText(renderContainer); 
// انتظار 100ms لضمان اكتمال معالجة النص الطويل قبل تصويره
await new Promise(r => setTimeout(r, 100));
         
            // 3. الإصلاح الجذري للباركود ليعمل مع الحاوية المخفية
            if (templateId === 1) {
                const barcodeSvg = renderContainer.querySelector(".barcode-render");
                if (barcodeSvg) {
                    JsBarcode(barcodeSvg, emp.jobId || "0000000000", {
                        format: "CODE128",
                        displayValue: false,
                        height: 28,
                        width: 1.5,
                        margin: 0,
                        background: "transparent"
                    });
                }
            }
            
            // توليد QR Code إذا لزم الأمر
            if (templateId === 4) {
                const qrEl = renderContainer.querySelector('.local-qr-render');
                if(qrEl) {
                    qrEl.innerHTML = '<canvas></canvas>';
                    const utf8Text = unescape(encodeURIComponent(qrEl.getAttribute('data-qrinfo')));
                    new QRious({
                        element: qrEl.querySelector('canvas'),
                        value: utf8Text, size: 200, level: 'L', padding: 0
                    });
                    qrEl.querySelector('canvas').style.width = '100%';
                    qrEl.querySelector('canvas').style.height = '100%';
                }
            }

            // انتظار تحميل الصور 
            await waitForImages(renderContainer);

            // التقاط الصورة بجودة عالية
            const canvas = await html2canvas(renderContainer, {
                scale: 3, 
                useCORS: true,
                backgroundColor: '#ffffff',
                logging: false
            });
            const imgData = canvas.toDataURL('image/jpeg', 0.98);

            // حساب الإحداثيات الرياضية للورقة
            const pageIndex = i % config.cardsPerPage;
            if (i > 0 && pageIndex === 0) {
                doc.addPage();
            }

            const col = pageIndex % config.cols;
            const row = Math.floor(pageIndex / config.cols);
            
            const x = config.startX + (col * (config.cardW_mm + config.gapX));
            const y = config.startY + (row * (config.cardH_mm + config.gapY));

            // رسم البطاقة على الـ PDF
            doc.addImage(imgData, 'JPEG', x, y, config.cardW_mm, config.cardH_mm);
        }

        // تنظيف وحفظ الملف
        document.body.removeChild(renderContainer);
        const fileName = isLargeFormatConfig 
            ? `البطاقات_المهنية_${institutionName}_نموذج_${templateId}.pdf`
            : `البطاقات_المهنية_${institutionName}_نموذج_${templateId}.pdf`;
            
        doc.save(fileName);
        alert(`✅ تم حفظ الملف (${fileName}) بنجاح بدقة تامة!`);

    } catch (error) {
        console.error("خطأ تقني في بناء الـ PDF:", error);
        alert("حدث خطأ أثناء التصدير. يرجى التحقق من لوحة تحكم المتصفح (F12) لمزيد من التفاصيل.");
    } finally {
        // 4. استرجاع الإعدادات الأصلية للواجهة (هام جداً)
        if (originalContainer) originalContainer.id = 'card-container';
        if (btn) {
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
        document.body.style.cursor = 'default';
    }
}

// استبدال الدوال الأصلية لترتبط بالهندسة الجديدة
function downloadSelectedPDF() {
    generateProfessionalPDF(false); // حجم قياسي (6 بطاقات، Portrait)
}

function downloadLargePDF() {
    generateProfessionalPDF(true); // حجم كبير (4 بطاقات، Landscape)
}

function autoShrinkText(container = document) {
    const elements = container.querySelectorAll('.shrink-target');
    
    elements.forEach(el => {
        el.style.fontSize = '25px'; // البدء بالحجم الطبيعي
        let fontSize = 25;
        
        // حد الأمان قبل الخط العمودي
        const containerLimit = 440; 
        const labelWidth = el.previousElementSibling ? el.previousElementSibling.offsetWidth : 0;
        const availableWidth = containerLimit - labelWidth;

        // التصغير بدقة 0.2 درجة لضمان أفضل تعبئة للمساحة دون قطع النص
        if (el.scrollWidth > availableWidth) {
            while (el.scrollWidth > availableWidth && fontSize > 2) {
                fontSize -= 0.2; 
                el.style.fontSize = fontSize + 'px';
            }
        }
        // التأكد من أن النص يظهر كاملاً بعد التصغير
        el.style.width = "auto";
    });
}
// تعديل استدعاء الدالة لضمان تنفيذها بعد الرسم تماماً
const originalRenderCards = renderCards;
renderCards = function() {
    originalRenderCards();
    setTimeout(autoShrinkText, 50); // تنفيذ التصغير بعد 50 مللي ثانية من الرسم
};


        

        // --- ميزة التحديث التلقائي الذكية ---
const VERSION_FILE_URL = 'version.json'; // تأكد من أن اسم الملف مطابق لما لديك
let currentVersion = "1.0.7"; // الإصدار الحالي المتوافق مع ملفك

async function checkVersionUpdate() {
    try {
        // إضافة timestamp لمنع المتصفح من كاش (Cache) الملف القديم
        const response = await fetch(`${VERSION_FILE_URL}?t=${Date.now()}`);
        if (!response.ok) return;

        const data = await response.json();

        // المقارنة: إذا كان رقم الإصدار في الملف يختلف عن الإصدار الحالي
        if (data.version !== currentVersion) {
            console.log("تم اكتشاف تحديث جديد: " + data.version);
            
            // إشعار المستخدم قبل التحويل (اختياري)
            alert("تم تحديث النظام إلى نسخة جديدة (" + data.version + "). سيتم توجيهك للرئيسية.");
            
            // العودة للصفحة الرئيسية وتحديث الصفحة
            window.location.href = "index.html"; 
        }
    } catch (error) {
        console.error("فشل التحقق من التحديثات:", error);
    }
}

// فحص التحديثات كل 30 ثانية
setInterval(checkVersionUpdate, 5000);

// فحص فوري عند تحميل الصفحة لأول مرة
checkVersionUpdate();

    </script>
