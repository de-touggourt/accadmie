<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة إحصائيات النظام</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f1f5f9; margin: 0; padding: 20px; color: #0f172a; }
        .container { max-width: 1300px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; margin-bottom: 20px; }
        .header h1 { margin: 0; font-size: 24px; color: #1e293b; font-weight: 800; }
        .filters { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 20px; background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0; }
        .filters input, .filters select { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-family: inherit; font-size: 14px; flex: 1; min-width: 150px; }
        .btn { padding: 10px 20px; background: #2563eb; color: #fff; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-family: inherit; }
        .btn:hover { background: #1d4ed8; }
        .table-container { overflow-x: auto; border: 1px solid #e2e8f0; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; text-align: right; }
        th { background: #f8fafc; padding: 15px; border-bottom: 2px solid #cbd5e1; font-weight: 700; color: #475569; position: sticky; top: 0; }
        td { padding: 15px; border-bottom: 1px solid #e2e8f0; font-size: 14px; }
        tr:hover { background-color: #f1f5f9; }
        .icon-yes { color: #10b981; font-weight: bold; font-size: 18px; }
        .icon-no { color: #ef4444; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>لوحة متابعة نشاط المؤسسات لنظام إدارة البطاقات المهنية</h1>
        <button class="btn" onclick="fetchData()">تحديث البيانات</button>
    </div>

    <div class="filters">
        <input type="text" id="search" placeholder="🔍 ابحث عن مؤسسة..." oninput="renderTable()">
        <select id="stage" onchange="renderTable()">
            <option value="">كل الأطوار</option>
            <option value="ابتدائي">ابتدائي</option>
            <option value="متوسط">متوسط</option>
            <option value="ثانوي">ثانوي</option>
        </select>
        <select id="daaira" onchange="renderTable()"><option value="">كل الدوائر</option></select>
        <select id="baladiya" onchange="renderTable()"><option value="">كل البلديات</option></select>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>اسم المؤسسة</th>
                    <th>الطور</th>
                    <th>الدائرة</th>
                    <th>البلدية</th>
                    <th style="text-align: center;">رفع قائمة</th>
                    <th style="text-align: center;">تحميل صور</th>
                    <th style="text-align: center;">طباعة</th>
                    <th style="text-align: center;">تحميل PDF</th>
                    <th>تاريخ آخر نشاط</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <tr><td colspan="9" style="text-align: center;">جاري تحميل البيانات...</td></tr>
            </tbody>
        </table>
    </div>
<div id="pagination-controls" style="display: flex; justify-content: center; align-items: center; margin-top: 20px; gap: 15px;">
        </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwY5-IhK9pEH21VDkiibh0tG9Evt1lb_bhht9BVAWGgTt39Bus02GtwWD5LgP139F_L-Q/exec"; // ⚠️ ضع نفس الرابط هنا أيضاً
   
 let allData = [];
    let currentFilteredData = []; // للاحتفاظ بالبيانات بعد الفلترة
    let currentPage = 1;          // الصفحة الحالية
    const rowsPerPage = 10;       // عدد الصفوف في كل صفحة

    // جلب البيانات من السيرفر
    function fetchData() {
        document.getElementById('table-body').innerHTML = '<tr><td colspan="9" style="text-align: center;">⏳ جاري التحديث...</td></tr>';
        fetch(SCRIPT_URL)
            .then(res => res.json())
            .then(data => {
                allData = data;
                populateDropdowns();
                renderTable();
            })
            .catch(err => {
                document.getElementById('table-body').innerHTML = '<tr><td colspan="9" style="text-align: center; color: red;">❌ خطأ في الاتصال بقاعدة البيانات</td></tr>';
            });
    }

    // استخراج الدوائر والبلديات من البيانات لتعبئة القوائم المنسدلة تلقائياً
    function populateDropdowns() {
        const daairas = [...new Set(allData.map(item => item.daaira))].filter(Boolean);
        const baladiyas = [...new Set(allData.map(item => item.baladiya))].filter(Boolean);
        
        const daairaSelect = document.getElementById('daaira');
        const baladiyaSelect = document.getElementById('baladiya');
        
        // الاحتفاظ بالخيار الأول (الكل)
        daairaSelect.innerHTML = '<option value="">كل الدوائر</option>';
        baladiyaSelect.innerHTML = '<option value="">كل البلديات</option>';

        daairas.forEach(d => daairaSelect.innerHTML += `<option value="${d}">${d}</option>`);
        baladiyas.forEach(b => baladiyaSelect.innerHTML += `<option value="${b}">${b}</option>`);
    }

    // 1. دالة الفلترة الأساسية (تُستدعى عند البحث أو تغيير القوائم)
    function renderTable() {
        const search = document.getElementById('search').value.toLowerCase();
        const stage = document.getElementById('stage').value;
        const daaira = document.getElementById('daaira').value;
        const baladiya = document.getElementById('baladiya').value;

        // تطبيق الفلاتر والاحتفاظ بالنتيجة
        currentFilteredData = allData.filter(row => {
            return (row.inst.toLowerCase().includes(search)) &&
                   (stage === "" || row.stage === stage) &&
                   (daaira === "" || row.daaira === daaira) &&
                   (baladiya === "" || row.baladiya === baladiya);
        });

        // عند أي عملية بحث جديدة، نعود للصفحة رقم 1 دائماً
        currentPage = 1;
        displayPage(currentPage);
    }

    // 2. دالة عرض صفحة محددة (تعرض 10 صفوف فقط)
    function displayPage(page) {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';

        if (currentFilteredData.length === 0) {
            tbody.innerHTML = '<tr><td colspan="9" style="text-align: center; padding: 20px;">لا توجد بيانات مطابقة</td></tr>';
            document.getElementById('pagination-controls').innerHTML = ''; // إخفاء الأزرار
            return;
        }

        // حساب إجمالي الصفحات
        const totalPages = Math.ceil(currentFilteredData.length / rowsPerPage);
        
        // التأكد من أن رقم الصفحة منطقي
        if (page < 1) page = 1;
        if (page > totalPages) page = totalPages;
        currentPage = page;

        // اقتطاع 10 صفوف فقط للـ الصفحة الحالية
        const startIndex = (currentPage - 1) * rowsPerPage;
        const endIndex = startIndex + rowsPerPage;
        const rowsToShow = currentFilteredData.slice(startIndex, endIndex);

        const getIcon = (val) => val === "✔️" ? '<span class="icon-yes">✔️</span>' : '<span class="icon-no">❌</span>';

        // رسم الصفوف المقتطعة فقط
        rowsToShow.forEach(row => {
            // تنسيق التاريخ الجميل الذي أضفناه سابقاً
            let finalDate = row.date;
            if (finalDate && finalDate.includes("T")) {
                let d = new Date(finalDate);
                let day = String(d.getDate()).padStart(2, '0');
                let month = String(d.getMonth() + 1).padStart(2, '0');
                let year = d.getFullYear();
                let hours = String(d.getHours()).padStart(2, '0');
                let minutes = String(d.getMinutes()).padStart(2, '0');
                let seconds = String(d.getSeconds()).padStart(2, '0');
                finalDate = `${day}-${month}-${year} ${hours}:${minutes}:${seconds}`;
            }

            tbody.innerHTML += `
                <tr>
                    <td style="font-weight: bold;">${row.inst}</td>
                    <td>${row.stage}</td>
                    <td>${row.daaira}</td>
                    <td>${row.baladiya}</td>
                    <td style="text-align: center;">${getIcon(row.excel)}</td>
                    <td style="text-align: center;">${getIcon(row.photo)}</td>
                    <td style="text-align: center;">${getIcon(row.print)}</td>
                    <td style="text-align: center;">${getIcon(row.pdf)}</td>
                    <td style="direction: ltr; text-align: right; color: #64748b; font-weight: bold;">${finalDate}</td>
                </tr>
            `;
        });

        // رسم أزرار التنقل
        renderPaginationControls(totalPages);
    }

    // 3. دالة رسم أزرار "التالي" و "السابق"
    function renderPaginationControls(totalPages) {
        const controls = document.getElementById('pagination-controls');
        let html = '';

        if (totalPages > 1) {
            // زر السابق (يتم تعطيله إذا كنا في الصفحة الأولى)
            const prevDisabled = currentPage === 1 ? 'disabled style="background:#cbd5e1; cursor:not-allowed;"' : '';
            html += `<button class="btn" style="padding: 6px 15px; margin: 0; min-width:80px;" onclick="displayPage(${currentPage - 1})" ${prevDisabled}>السابق</button>`;
            
            // مؤشر الصفحات
            html += `<span style="font-weight: 800; color: #0f172a; font-size: 15px; padding: 0 10px;">الصفحة ${currentPage} من ${totalPages}</span>`;
            
            // زر التالي (يتم تعطيله إذا كنا في الصفحة الأخيرة)
            const nextDisabled = currentPage === totalPages ? 'disabled style="background:#cbd5e1; cursor:not-allowed;"' : '';
            html += `<button class="btn" style="padding: 6px 15px; margin: 0; min-width:80px;" onclick="displayPage(${currentPage + 1})" ${nextDisabled}>التالي</button>`;
        }

        controls.innerHTML = html;
    }
    // تشغيل عند فتح الصفحة
    window.onload = fetchData;
</script>

</body>
</html>
